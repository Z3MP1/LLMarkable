[project]
name = "llmarkable"
version = "0.1.0"
description = "LLMarkable: Transform documents into LLM-friendly, remarkable outputs"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.52.2",
    "docling>=2.36.1",
    "google>=3.0.0",
    "openai>=1.84.0",
    "rich>=14.0.0",
    "transformers>=4.52.4",
    "typer>=0.16.0",
]

[dependency-groups]
dev = [
    "mypy>=1.16.0",
    "pytest>=8.4.0",
    "pytest-asyncio>=1.0.0",
    "pytest-cov>=6.1.1",
    "ruff>=0.11.13",
    "types-pyyaml>=6.0.12.20250516",
]

[tool.mypy]
# Enable strict optional checking, more rigorous type checks
strict = true
# Use a cache to speed up repeated runs
cache_dir = ".mypy_cache"

exclude = ["tests/*"]

[tool.ruff]
# Base line length
line-length = 120
# Ignore auto-generated files and virtual env
select = ["ALL"]
ignore = [
    "S101",      # Use of `assert` detected
    "FBT001",    # Boolean-typed positional argument in function definition
    "D203",      # 1 blank line required before class docstring (conflicts with D211)
    "D212",      # Multi-line docstring summary should start at the first line
    "FBT002",    # Boolean default positional argument in function definition (intentional for utility functions)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = [
    "ARG001",    # Unused function argument: `args` / `kwargs`
    "TRY300",    # Consider moving this statement to an `else` block
    "TRY003",    # Avoid specifying long messages outside the exception class
    "E501",      # Line too long (> line-length)
    "EM101",     # Exception must not use a string literal, assign to variable first
    "PT011",     # Raised Exception too broad, use a more specific exception
    "PLR2004",   # Magic value used in comparison, consider replacing `[value]` with a constant variable
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.html]
directory = "tests/htmlcov"

[tool.coverage.xml]
output = "tests/coverage.xml"







